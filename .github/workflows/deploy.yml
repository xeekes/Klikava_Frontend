name: Deploy Storefront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy storefront
        run: |
          set -e
          cd ~/Klikava_Frontend
          git fetch origin main
          git reset --hard origin/main
          cd frontend
          docker compose up -d --build
          docker image prune -f
